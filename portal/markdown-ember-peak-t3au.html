<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCC — Markdown History</title>
<style>
  :root{--bg:#0f1117;--panel:#1a1d27;--ink:#e8eaf0;--muted:#7c8aa8;--line:#283452;--accent:#3ea6ff;--green:#39d98a;--amber:#ffc857;--red:#ff6b6b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
  header{background:var(--panel);border-bottom:1px solid var(--line)}
  .hd{max-width:1200px;margin:0 auto;padding:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:space-between}
  .logo{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7b61ff);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff}
  .hd h1{font-size:17px;font-weight:700}
  .sub{color:var(--muted);font-size:12px}
  .wrap{max-width:1200px;margin:0 auto;padding:0 18px 60px}
  .stats{display:flex;gap:14px;flex-wrap:wrap;margin:22px 0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 22px;min-width:130px}
  .stat .n{font-size:26px;font-weight:700;color:var(--accent)}
  .stat .l{color:var(--muted);font-size:12px;margin-top:2px}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:28px 0 10px}
  .tools{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  input[type=search]{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:14px;min-width:220px}
  select{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:14px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:24px}
  th,td{text-align:left;padding:10px 13px;border-bottom:1px solid var(--line);font-size:13.5px}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap}
  th.num,td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  tr:last-child td{border-bottom:0}
  .lnk{color:var(--accent);text-decoration:none}
  .lnk:hover{text-decoration:underline}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .b-applied{background:#39d98a22;color:var(--green)}
  .b-skipped{background:#ffc85722;color:var(--amber)}
  .b-failed{background:#ff6b6b22;color:var(--red)}
  .b-preview{background:#3ea6ff22;color:var(--accent)}
  .pct-drop{color:var(--red);font-weight:600}
  .empty{color:var(--muted);padding:18px;text-align:center}
  .cool-bar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:4px;min-width:80px}
  .cool-fill{height:100%;background:var(--amber);border-radius:3px}
  @media(max-width:700px){.hide-sm{display:none}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo">SCC</div>
      <div><h1>Markdown History</h1><div class="sub">Auto price-adjust log · Mark only</div></div>
    </div>
    <div class="sub" id="updated"></div>
  </div>
</header>
<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="n" id="sApplied">—</div><div class="l">Markdowns applied</div></div>
    <div class="stat"><div class="n" id="sRuns">—</div><div class="l">Runs total</div></div>
    <div class="stat"><div class="n" id="sCooldown">—</div><div class="l">In cooldown</div></div>
    <div class="stat"><div class="n" id="sAvg">—</div><div class="l">Avg drop %</div></div>
  </div>

  <h2>Run history</h2>
  <table id="runsTable">
    <thead><tr>
      <th>Date</th>
      <th class="num">Applied</th>
      <th class="num hide-sm">Skipped</th>
      <th class="num hide-sm">Failed</th>
      <th class="num hide-sm">Avg drop</th>
    </tr></thead>
    <tbody id="runsBody"></tbody>
  </table>

  <h2>Cooldown tracker <span id="cooldownCount" style="color:var(--amber)"></span></h2>
  <table id="coolTable">
    <thead><tr>
      <th>Card</th>
      <th class="num hide-sm">Price after</th>
      <th class="num hide-sm">Last markdown</th>
      <th>Days left</th>
    </tr></thead>
    <tbody id="coolBody"></tbody>
  </table>

  <h2>Full log</h2>
  <div class="tools">
    <input type="search" id="q" placeholder="Search cards…">
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option value="applied">Applied</option>
      <option value="skipped">Skipped</option>
      <option value="failed">Failed</option>
    </select>
  </div>
  <table id="logTable">
    <thead><tr>
      <th>Date</th>
      <th>Card</th>
      <th class="num hide-sm">From</th>
      <th class="num hide-sm">To</th>
      <th class="num">Drop</th>
      <th class="hide-sm">Status</th>
      <th class="hide-sm">Note</th>
    </tr></thead>
    <tbody id="logBody"></tbody>
  </table>
</div>

const money = n => n==null ? '—' : '\$'+Number(n).toFixed(2);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function statusBadge(s){
  const m=String(s||'').toLowerCase();
  if(m==='skipped')  return '<span class="badge b-skipped">Skipped</span>';
  if(m==='failed')   return '<span class="badge b-failed">Failed</span>';
  if(m==='preview')  return '<span class="badge b-preview">Preview</span>';
  return '<span class="badge b-applied">Applied</span>';
}

function cardLink(r){
  return r.item ? `<a class="lnk" href="https://www.ebay.com/itm/${esc(r.item)}" target="_blank" rel="noopener">${esc(r.title)||esc(r.sku)||r.item} ↗</a>`
                : `<span>${esc(r.title)||esc(r.sku)||'—'}</span>`;
}

function renderRuns(){
  const b=document.getElementById('runsBody');
  b.innerHTML = DATA.runs.length ? DATA.runs.map(r=>`<tr>
    <td>${esc(r.date)}</td>
    <td class="num">${r.applied}</td>
    <td class="num hide-sm">${r.skipped}</td>
    <td class="num hide-sm">${r.failed}</td>
    <td class="num hide-sm">${r.avg_pct!=null?r.avg_pct+'%':'—'}</td>
  </tr>`).join('') : `<tr><td colspan="5" class="empty">No runs yet.</td></tr>`;
}

function renderCooldown(){
  const b=document.getElementById('coolBody');
  const rows=DATA.cooldown;
  document.getElementById('cooldownCount').textContent=rows.length?`(${rows.length})`:'';
  b.innerHTML = rows.length ? rows.map(r=>{
    const pct=Math.round((1-(r.days_left/30))*100);
    return `<tr>
      <td>${cardLink(r)}${r.sku?`<div style="color:var(--muted);font-size:12px">${esc(r.sku)}</div>`:''}</td>
      <td class="num hide-sm">${money(r.price)}</td>
      <td class="num hide-sm">${esc(r.last_date)}</td>
      <td><div style="font-weight:600;color:var(--amber)">${r.days_left}d</div>
          <div class="cool-bar"><div class="cool-fill" style="width:${pct}%"></div></div></td>
    </tr>`;
  }).join('') : `<tr><td colspan="4" class="empty">No cards in cooldown — all eligible.</td></tr>`;
}

function renderLog(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const sf=(document.getElementById('statusFilter').value||'').toLowerCase();
  let rows=DATA.log.filter(r=>{
    const matchQ=!q||(r.title+r.sku+r.note+r.strategy).toLowerCase().includes(q);
    const matchS=!sf||String(r.status).toLowerCase()===sf||
                 (!sf&&true)||
                 (sf==='applied'&&!['skipped','failed','preview'].includes(String(r.status).toLowerCase()));
    return matchQ&&matchS;
  });
  const b=document.getElementById('logBody');
  b.innerHTML = rows.length ? rows.map(r=>`<tr>
    <td style="white-space:nowrap">${esc(r.date)}</td>
    <td>${cardLink(r)}${r.sku?`<div style="color:var(--muted);font-size:12px">${esc(r.sku)}</div>`:''}</td>
    <td class="num hide-sm">${money(r.from)}</td>
    <td class="num hide-sm">${money(r.to)}</td>
    <td class="num pct-drop">${r.pct!=null?(r.pct>0?'+':'')+r.pct+'%':'—'}</td>
    <td class="hide-sm">${statusBadge(r.status)}</td>
    <td class="hide-sm" style="color:var(--muted);font-size:12px">${esc(r.note)}</td>
  </tr>`).join('') : `<tr><td colspan="7" class="empty">No entries match.</td></tr>`;
}

function init(){
  document.getElementById('updated').textContent='Updated '+DATA.updated;
  document.getElementById('sApplied').textContent=DATA.stats.applied;
  document.getElementById('sRuns').textContent=DATA.stats.runs;
  document.getElementById('sCooldown').textContent=DATA.stats.cooldown;
  document.getElementById('sAvg').textContent=(DATA.stats.avg_pct||0)+'%';
  renderRuns(); renderCooldown(); renderLog();
  document.getElementById('q').addEventListener('input',renderLog);
  document.getElementById('statusFilter').addEventListener('change',renderLog);
}
init();
</script>
